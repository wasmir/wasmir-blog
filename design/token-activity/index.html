<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Token activity — handoff prototype</title>
<link rel="stylesheet" href="styles/tokens.css" />
<style>
/* Prototype shell — centers the single card so it can be reviewed in isolation. */
.proto-stage { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
.proto-stage .page { padding: 0; }
.proto-stage .module { padding-top: 0; width: 100%; }

  /* ============================================================
     Wasmir — 个人主页 (单页)
     居中博客式版心 · 纯 HTML/CSS · 无框架依赖 (Astro-friendly)
     变体切换用纯 CSS :checked 实现，上线时删掉不要的变体即可。
     ============================================================ */
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--text);
    font-family: var(--font-text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--pop); color: var(--pop-ink); }

  /* 居中版心 — 博客宽度，不太宽 */
  .page {
    max-width: 712px;
    margin: 0 auto;
    padding: 0 24px 120px;
  }

  /* ---------- 通用 module 节奏 ---------- */
  .module { padding-top: 72px; }
  .module-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }
  .kicker {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 12px;
    letter-spacing: var(--tracking-caps);
    text-transform: uppercase;
    color: var(--text-muted);
    display: inline-flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 0;
  }
  .kicker::before {
    content: "";
    width: 7px; height: 7px;
    border-radius: 2px;
    background: var(--pop);
  }
  .module h2 {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 26px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--ink-900);
    margin: 0;
  }
  .module-note {
    font-size: 13px;
    color: var(--text-subtle);
    margin: 0;
  }

  /* ============================================================
     INTRO  (顶部一小段自我介绍 — 紧凑)
     ============================================================ */
  .intro { padding-top: 64px; }
  .intro-id { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .intro-id .name {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 23px;
    letter-spacing: -0.02em;
    color: var(--ink-900);
  }
  .intro-id .name .dot { color: var(--pop); }
  .tagline-inline {
    font-family: var(--font-text);
    font-weight: 500;
    font-size: 13px;
    line-height: 1.4;
    color: var(--text-subtle);
  }
  .tagline-inline mark {
    background: var(--pop-soft);
    color: var(--pop-ink);
    padding: 0 5px;
    border-radius: 5px;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ============================================================
     MODULE 1 — TOKEN HEATMAP
     ============================================================ */
  .heat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
    padding: 24px;
  }
  /* 汇总数字 */
  .heat-summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 24px;
  }
  .summary-item { padding: 2px 0; }
  .summary-item .s-num {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: clamp(22px, 5vw, 30px);
    letter-spacing: -0.025em;
    color: var(--ink-900);
    line-height: 1;
    display: flex;
    align-items: baseline;
    gap: 3px;
  }
  .summary-item .s-num .unit {
    font-size: 0.55em;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0;
  }
  .summary-item .s-lbl {
    font-size: 12px;
    color: var(--text-subtle);
    margin-top: 7px;
    line-height: 1.3;
  }
  .summary-item.peak .s-num { color: var(--ink-900); }
  .summary-item.peak .s-num::before {
    content: "";
    width: 9px; height: 9px; border-radius: 2px;
    background: var(--pop); margin-right: 6px; align-self: center;
  }

  /* 热力图本体 */
  .heat-scroll { overflow-x: auto; padding-bottom: 4px; }
  .heat-board { display: inline-flex; gap: 6px; align-items: flex-start; }
  .heat-weekdays {
    display: grid;
    grid-template-rows: repeat(7, 9px);
    gap: 2px;
    margin-top: 20px;            /* clears the months row (14px + 6px gap) */
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-subtle);
    text-align: right;
  }
  .heat-weekdays span { line-height: 9px; height: 9px; }
  .heat-main { display: flex; flex-direction: column; gap: 6px; }
  .heat-months {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 11px;     /* matches 9px cell + 2px gap pitch */
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-subtle);
    height: 14px;
    align-items: end;
  }
  .heat-months span { white-space: nowrap; }
  .heat-cells {
    display: grid;
    grid-template-rows: repeat(7, 9px);
    grid-auto-flow: column;
    grid-auto-columns: 9px;
    gap: 2px;
  }
  .cell {
    width: 9px; height: 9px;
    border-radius: 2px;
    background: var(--ink-100);
    box-shadow: inset 0 0 0 1px rgba(36,34,32,0.04);
    transition: transform var(--dur-fast) var(--ease-out);
  }
  .cell:hover { transform: scale(1.45); cursor: default; }
  /* 经典 GitHub 绿阶 */
  .cell.l0 { background: #EBEDF0; }
  .cell.l1 { background: #9BE9A8; }
  .cell.l2 { background: #40C463; }
  .cell.l3 { background: #30A14E; }
  .cell.l4 { background: #216E39; }
  .cell.empty { background: transparent; box-shadow: none; }

  /* —— 数据缺失（4.16 之前）—— */
  .heat-cells { position: relative; }
  /* 缺失区域里的格子统一压成中性灰，不再伪装成“有活动” */
  .cell.lost {
    background: #EBEDF0 !important;
    box-shadow: inset 0 0 0 1px rgba(36,34,32,0.05);
  }
  .heat-loss {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1.5px dashed var(--ink-300);
    border-radius: 3px 0 0 3px;
    /* 细斜纹蒙版 —— 暖中性，低存在感 */
    background-image: repeating-linear-gradient(
      -45deg,
      rgba(36,34,32,0.045) 0,
      rgba(36,34,32,0.045) 1px,
      transparent 1px,
      transparent 6px
    );
    overflow: hidden;
  }
  /* 蒙版上的标签胶囊 */
  .loss-tag {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 7px 13px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    box-shadow: var(--shadow-sm);
    white-space: nowrap;
  }
  .loss-tag svg { width: 14px; height: 14px; stroke: var(--ink-500); flex: none; }
  .loss-tag .lt-main {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-800);
  }
  .loss-tag .lt-sub {
    font-size: 11px;
    color: var(--text-subtle);
    padding-left: 8px;
    border-left: 1px solid var(--border);
  }

  /* 图例 */
  .heat-legend {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 7px;
    margin-top: 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-subtle);
  }
  .heat-legend .swatches { display: flex; gap: 3px; }
  .heat-legend .cell { transition: none; }
  .heat-legend .cell:hover { transform: none; }

  /* ============================================================
     SEGMENTED TOGGLE (纯 CSS 变体切换)
     ============================================================ */
  .vswitch { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }
  .seg {
    display: inline-flex;
    background: var(--ink-100);
    border: 1px solid var(--border);
    border-radius: var(--radius-pill);
    padding: 3px;
    gap: 2px;
  }
  .seg label {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 6px 13px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: background var(--dur-base) var(--ease-out), color var(--dur-base) var(--ease-out);
    user-select: none;
  }
  .seg label:hover { color: var(--ink-800); }
  .variant { display: none; }

  /* projects toggle wiring */
  #pv-cards:checked ~ .seg label[for="pv-cards"],
  #pv-list:checked  ~ .seg label[for="pv-list"] {
    background: var(--white); color: var(--ink-900); box-shadow: var(--shadow-xs);
  }
  #pv-cards:checked ~ .variant--cards { display: grid; }
  #pv-list:checked  ~ .variant--list  { display: flex; }

  /* learning toggle wiring */
  #lv-pills:checked ~ .seg label[for="lv-pills"],
  #lv-prog:checked  ~ .seg label[for="lv-prog"] {
    background: var(--white); color: var(--ink-900); box-shadow: var(--shadow-xs);
  }
  #lv-pills:checked ~ .variant--pills { display: block; }
  #lv-prog:checked  ~ .variant--prog  { display: flex; }

  /* ============================================================
     MODULE 2 — PROJECT PROGRESS
     ============================================================ */
  /* status badge */
  .badge {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: var(--radius-pill);
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; }
  .badge.done { background: var(--ink-100); color: var(--ink-600); }
  .badge.done::before { background: var(--ink-400); }
  .badge.doing { background: var(--pop-soft); color: var(--pop-ink); }
  .badge.doing::before { background: var(--pop); box-shadow: 0 0 0 3px rgba(198,242,77,0.35); }

  /* CARD variant */
  .variant--cards {
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
  }
  .proj-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xs);
    padding: 20px;
    display: flex;
    flex-direction: column;
    transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
  }
  .proj-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
  .proj-card .badge { align-self: flex-start; margin-bottom: 14px; }
  .proj-card .pname {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: var(--ink-900);
    line-height: 1.2;
  }
  .proj-card .pcode {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-subtle);
    margin-top: 3px;
  }
  .proj-card .pdesc {
    font-size: 14px;
    line-height: 1.55;
    color: var(--text-muted);
    margin: 12px 0 0;
  }

  /* ---- PROJECT LIST (status + blurb + progress) ---- */
  .pj-list { border-top: 1px solid var(--border); }
  .pj-item {
    display: flex;
    flex-direction: column;
    gap: 9px;
    padding: 18px 2px;
    border-bottom: 1px solid var(--border);
  }
  .pj-head { display: flex; align-items: center; gap: 12px; }
  .pj-name {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: var(--ink-900);
    flex: 1;
    min-width: 0;
  }
  .pj-pct { font-family: var(--font-mono); font-size: 12px; color: var(--text-subtle); flex: none; }
  .pj-blurb { font-size: 14px; line-height: 1.55; color: var(--text-muted); margin: 0; max-width: 62ch; }
  .pj-track { height: 6px; background: var(--ink-100); border-radius: var(--radius-pill); overflow: hidden; }
  .pj-fill { height: 100%; background: var(--pop); border-radius: var(--radius-pill); }
  .pj-item.dropped { opacity: 0.55; }
  .pj-item.dropped .pj-name { text-decoration: line-through; text-decoration-color: var(--ink-400); color: var(--ink-500); }

  /* status badge variants (extend .badge) */
  .badge.todo { background: transparent; color: var(--ink-500); border: 1px solid var(--border-strong); }
  .badge.todo::before { background: transparent; box-shadow: inset 0 0 0 1.5px var(--ink-400); }
  .badge.dropped { background: var(--danger-soft); color: var(--danger); }
  .badge.dropped::before { background: var(--danger); }

  /* LIST / changelog variant */
  .variant--list { flex-direction: column; gap: 0; }
  .proj-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 4px;
    border-top: 1px solid var(--border);
  }
  .proj-row:last-child { border-bottom: 1px solid var(--border); }
  .proj-row .rbadge { flex: none; width: 64px; padding-top: 2px; }
  .proj-row .rbody { flex: 1; min-width: 0; }
  .proj-row .rname {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: var(--ink-900);
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex-wrap: wrap;
  }
  .proj-row .rcode { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); font-weight: 400; }
  .proj-row .rdesc { font-size: 14px; line-height: 1.55; color: var(--text-muted); margin: 5px 0 0; }
  .proj-row:hover .rname { color: var(--ink-900); }

  /* ============================================================
     MODULE 3 — LEARNING PROGRESS
     ============================================================ */
  /* PILLS variant */
  .learn-group + .learn-group { margin-top: 28px; }
  .learn-group .lg-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .learn-group .lg-title {
    font-family: var(--font-text);
    font-weight: 700;
    font-size: 15px;
    color: var(--ink-800);
  }
  .learn-group .lg-count {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-subtle);
  }
  .learn-group .lg-dot { width: 8px; height: 8px; border-radius: 50%; }
  .learn-group.mastered .lg-dot { background: var(--ink-800); }
  .learn-group.learning .lg-dot { background: var(--pop); box-shadow: 0 0 0 3px var(--pop-soft); }
  .pill-row { display: flex; flex-wrap: wrap; gap: 9px; }
  .pill {
    font-family: var(--font-text);
    font-weight: 600;
    font-size: 14px;
    padding: 8px 15px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
    background: var(--white);
    color: var(--ink-800);
    white-space: nowrap;
    transition: transform var(--dur-fast) var(--ease-out);
  }
  .pill:hover { transform: translateY(-1px); }
  .pill.is-mastered {
    background: var(--ink-800);
    color: var(--cream);
    border-color: var(--ink-800);
  }
  .pill.is-learning {
    background: var(--white);
    border: 1.5px dashed var(--border-strong);
    color: var(--ink-700, var(--ink-800));
  }
  .pill.is-learning::before {
    content: "";
    display: inline-block;
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--pop); margin-right: 7px;
    vertical-align: middle;
  }

  /* PROGRESS-LIST variant */
  .prog-board { display: flex; flex-direction: column; gap: 26px; }
  .variant--prog { flex-direction: column; gap: 22px; }
  .prog-col { }
  .prog-col .pc-head {
    display: flex; align-items: center; gap: 9px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-subtle);
    margin-bottom: 12px;
  }
  .prog-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-top: 1px solid var(--border);
  }
  .prog-item .pi-name {
    font-weight: 600;
    font-size: 15px;
    color: var(--ink-900);
    flex: none;
    width: 168px;
  }
  .prog-item .pi-track {
    flex: 1;
    height: 7px;
    background: var(--ink-100);
    border-radius: var(--radius-pill);
    overflow: hidden;
  }
  .prog-item .pi-fill {
    display: block;
    height: 100%;
    border-radius: var(--radius-pill);
  }
  .prog-item.done .pi-fill { background: var(--ink-800); }
  .prog-item.wip .pi-fill { background: var(--pop); }
  .prog-item .pi-pct {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-subtle);
    width: 34px;
    text-align: right;
    flex: none;
  }

  /* colophon */
  .colophon {
    margin-top: 80px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-subtle);
    display: flex;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  /* ---------- 进场动效 (轻微，scroll reveal) ---------- */
  .reveal { opacity: 0; transform: translateY(14px); }
  .reveal.in { opacity: 1; transform: none; transition: opacity .6s var(--ease-out), transform .6s var(--ease-out); }
  @media (prefers-reduced-motion: reduce) {
    .reveal, .reveal.in { opacity: 1; transform: none; transition: none; }
    .cell, .proj-card, .pill { transition: none; }
  }

  /* ---------- 窄屏 ---------- */
  @media (max-width: 560px) {
    .variant--cards { grid-template-columns: 1fr; }
    .heat-summary { grid-template-columns: repeat(2, 1fr); gap: 18px 8px; }
    .prog-item .pi-name { width: 120px; font-size: 14px; }
    .hero .lead { font-size: 16px; }
  }

</style>
</head>
<body>
<div class="proto-stage">
<main class="page">

<section class="module" id="tokens" data-screen-label="token-heatmap">
    <div class="module-head">
      <span class="kicker">Token activity</span>
    </div>

    <div class="heat-card">
      <div class="heat-summary">
        <div class="summary-item">
          <div class="s-num">180<span class="unit">M</span></div>
          <div class="s-lbl">累计 token</div>
        </div>
        <div class="summary-item">
          <div class="s-num">23<span class="unit">天</span></div>
          <div class="s-lbl">最长连续 streak</div>
        </div>
        <div class="summary-item peak">
          <div class="s-num">4.2<span class="unit">M</span></div>
          <div class="s-lbl">单日峰值</div>
        </div>
        <div class="summary-item">
          <div class="s-num">26<span class="unit">M</span></div>
          <div class="s-lbl">本月 token</div>
        </div>
      </div>

      <div class="heat-scroll">
        <div class="heat-board">
          <div class="heat-weekdays">
            <span></span><span>一</span><span></span><span>三</span><span></span><span>五</span><span></span>
          </div>

<script>
  // Data-loss mask — tags every cell before the cutoff and lays a hatch scrim over the
  // leading span, ending at a dashed boundary on the first surviving day.
  // It measures the live grid (firstAlive.offsetLeft), so the band stays pinned to the
  // cutoff date and re-flows automatically as real post-cutoff data accumulates.
  (function () {

    var CUTOFF = new Date('2026-04-16T00:00:00');
    var cells = document.querySelector('.heat-cells');
    if (!cells) return;
    var nodes = cells.querySelectorAll('.cell');
    var firstAlive = null;
    nodes.forEach(function (c) {
      var t = (c.getAttribute('title') || '').trim().slice(0, 10);
      if (!/^\d{4}-\d{2}-\d{2}$/.test(t)) return;        // 跳过占位格
      var d = new Date(t + 'T00:00:00');
      if (d < CUTOFF) {
        c.classList.add('lost');
      } else if (!firstAlive) {
        firstAlive = c;
      }
    });
    // 没有可显示的“存活”数据，或没有缺失数据 → 不铺蒙版
    if (!firstAlive || !cells.querySelector('.cell.lost')) return;

    var overlay = document.createElement('div');
    overlay.className = 'heat-loss';
    overlay.innerHTML =
      '<span class="loss-tag">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" ' +
        'stroke-linecap="round" stroke-linejoin="round">' +
        '<path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>' +
        '<path d="M3 5v14c0 1.66 4 3 9 3"/>' +
        '<path d="M3 5c0 1.66 4 3 9 3s9-1.34 9-3-4-3-9-3-9 1.34-9 3"/>' +
        '<line x1="2" y1="2" x2="22" y2="22"/>' +
        '</svg>' +
        '<span class="lt-main">Data loss</span>' +
        '<span class="lt-sub">4.16 之前数据缺失</span>' +
      '</span>';
    cells.appendChild(overlay);

    function place() {
      overlay.style.width = Math.max(0, firstAlive.offsetLeft - 1) + 'px';
    }
    place();
    window.addEventListener('resize', place);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(place);
  })();
</script>
